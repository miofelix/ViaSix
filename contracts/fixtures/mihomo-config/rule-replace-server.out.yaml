# Expected shape after rule-mode projection (illustrative; exact key order may differ).
# server must be the selected IPv6; credentials/transport preserved; no providers/groups.
mode: rule
proxies:
  - name: My VLESS
    type: vless
    server: 2001:db8::1
    port: 443
    uuid: 11111111-1111-4111-1111-111111111111
    network: ws
    tls: true
    servername: origin.example.com
    ws-opts:
      path: /proxy
      headers:
        Host: origin.example.com
rules:
  # private/loopback/link-local DIRECT rules are implementation-defined but required
  - MATCH,My VLESS
